      const { useState, useEffect, useRef } = React;

      // 1. SOUND GENERATOR (Web Audio Synthesizer)
      class BodaAudioSystem {
        constructor() {
          this.ctx = null;
          this.engineOsc = null;
          this.engineGain = null;
          this.isEngineRunning = false;
        }
        init() {
          if (this.ctx) return;
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (AudioContextClass) this.ctx = new AudioContextClass();
        }
        playCoin() {
          this.init();
          if (!this.ctx) return;
          if (this.ctx.state === 'suspended') this.ctx.resume();
          const now = this.ctx.currentTime;
          const osc1 = this.ctx.createOscillator();
          const osc2 = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc1.type = 'sine';
          osc1.frequency.setValueAtTime(880, now);
          osc1.frequency.exponentialRampToValueAtTime(1320, now + 0.15);
          osc2.type = 'triangle';
          osc2.frequency.setValueAtTime(1109, now);
          osc2.frequency.exponentialRampToValueAtTime(1760, now + 0.15);
          gain.gain.setValueAtTime(0.08, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(this.ctx.destination);
          osc1.start(now);
          osc2.start(now);
          osc1.stop(now + 0.2);
          osc2.stop(now + 0.2);
        }
        playFuel() {
          this.init();
          if (!this.ctx) return;
          if (this.ctx.state === 'suspended') this.ctx.resume();
          const now = this.ctx.currentTime;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(330, now);
          osc.frequency.exponentialRampToValueAtTime(660, now + 0.25);
          gain.gain.setValueAtTime(0.12, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(now);
          osc.stop(now + 0.3);
        }
        playCrash() {
          this.init();
          if (!this.ctx) return;
          if (this.ctx.state === 'suspended') this.ctx.resume();
          const now = this.ctx.currentTime;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(160, now);
          osc.frequency.exponentialRampToValueAtTime(30, now + 0.4);
          gain.gain.setValueAtTime(0.25, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(now);
          osc.stop(now + 0.5);
        }
        playHorn() {
          this.init();
          if (!this.ctx) return;
          if (this.ctx.state === 'suspended') this.ctx.resume();
          const now = this.ctx.currentTime;
          this.beep(880, 0.08, now);
          this.beep(880, 0.08, now + 0.12);
        }
        beep(freq, dur, start) {
          if (!this.ctx) return;
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(freq, start);
          gain.gain.setValueAtTime(0.05, start);
          gain.gain.setValueAtTime(0.05, start + dur - 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start(start);
          osc.stop(start + dur);
        }
        playSuccess() {
          this.init();
          if (!this.ctx) return;
          if (this.ctx.state === 'suspended') this.ctx.resume();
          const now = this.ctx.currentTime;
          const notes = [261.63, 329.63, 392.00, 523.25];
          notes.forEach((freq, idx) => {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now + idx * 0.1);
            gain.gain.setValueAtTime(0.1, now + idx * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.1 + 0.25);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(now + idx * 0.1);
            osc.stop(now + idx * 0.1 + 0.3);
          });
        }
        startEngine() {
          this.init();
          if (!this.ctx || this.isEngineRunning) return;
          if (this.ctx.state === 'suspended') this.ctx.resume();
          try {
            const now = this.ctx.currentTime;
            this.engineOsc = this.ctx.createOscillator();
            this.engineGain = this.ctx.createGain();
            this.engineOsc.type = 'triangle';
            this.engineOsc.frequency.setValueAtTime(45, now);
            this.engineGain.gain.setValueAtTime(0.03, now);
            this.engineOsc.connect(this.engineGain);
            this.engineGain.connect(this.ctx.destination);
            this.engineOsc.start(now);
            this.isEngineRunning = true;
          } catch (e) {
            console.warn(e);
          }
        }
        updateEngine(speedRatio) {
          if (!this.ctx || !this.isEngineRunning || !this.engineOsc || !this.engineGain) return;
          const now = this.ctx.currentTime;
          const targetFreq = 45 + speedRatio * 95;
          const jitter = Math.sin(now * 50) * 1.5;
          this.engineOsc.frequency.setTargetAtTime(targetFreq + jitter, now, 0.05);
          const targetGain = 0.02 + speedRatio * 0.04;
          this.engineGain.gain.setTargetAtTime(targetGain, now, 0.1);
        }
        stopEngine() {
          if (this.engineOsc) {
            try { this.engineOsc.stop(); this.engineOsc.disconnect(); } catch (e) {}
            this.engineOsc = null;
          }
          if (this.engineGain) {
            try { this.engineGain.disconnect(); } catch (e) {}
            this.engineGain = null;
          }
          this.isEngineRunning = false;
        }

                <div className="flex gap-2">
                  <button onTouchStart={() => onBrake(true)} onTouchEnd={() => onBrake(false)} onMouseDown={() => onBrake(true)} onMouseUp={() => onBrake(false)} onMouseLeave={() => onBrake(false)} className="w-14 h-14 rounded-xl bg-zinc-950/85 border border-red-800 text-red-500 flex flex-col items-center justify-center text-[10px] font-black tracking-wider">BRAKE</button>
                  <button onTouchStart={() => onGas(true)} onTouchEnd={() => onGas(false)} onMouseDown={() => onGas(true)} onMouseUp={() => onGas(false)} onMouseLeave={() => onGas(false)} className="w-14 h-14 rounded-xl bg-emerald-600/85 border border-emerald-500 text-white flex flex-col items-center justify-center text-[10px] font-black tracking-wider">GAS</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // 6. GAME CANVAS CORE SIMULATION ENGINE
      function GameCanvas({ activeBikeId, locationId, upgrades, steeringMode, weather, isPaused, leftSteerPressed, rightSteerPressed, gasPressed, brakePressed, onGameStatsUpdate, onPassengerUpdate, onTriggerWarning, onGameOver, onPlaySound, soundEnabled }) {
        const containerRef = useRef(null);
        const canvasRef = useRef(null);
        const requestRef = useRef(null);

        const stateRef = useRef({
          bikeX: 200,
          bikeY: 500,
          bikeVx: 0,
          bikeSpeed: 0,
          bikeMaxSpeed: 15,
          bikeLean: 0,
          fuel: 100,
          maxFuel: 100,
          coinsCollectedThisRun: 0,
          distanceKm: 0,
          activePassenger: null,
          stageProgress: 0,
          stageActive: false,
          stageX: 0,
          stageY: -300,
          stagePassenger: null,
          roadScrollY: 0,
          sceneryScrollY: 0,
          obstacles: [],
          coins: [],
          particles: []
        });

        const bikeConfigRef = useRef(BIKES[0]);
        const locationConfigRef = useRef(LOCATIONS[0]);
        const upgradesRef = useRef(upgrades);
        const steeringRef = useRef(steeringMode);
        const weatherRef = useRef(weather);
        const keysPressed = useRef({});
        const inputState = useRef({ left: false, right: false, gas: false, brake: false });
        const tiltRef = useRef(0);

        useEffect(() => {
          const bike = BIKES.find(b => b.id === activeBikeId) || BIKES[0];
          const loc = LOCATIONS.find(l => l.id === locationId) || LOCATIONS[0];
          bikeConfigRef.current = bike;
          locationConfigRef.current = loc;
          upgradesRef.current = upgrades;
          steeringRef.current = steeringMode;
          weatherRef.current = weather;
          stateRef.current.maxFuel = 100 + upgrades.tank * 30;
          stateRef.current.bikeMaxSpeed = bike.maxSpeed + upgrades.engine * 1.2;
        }, [activeBikeId, locationId, upgrades, steeringMode, weather]);

        useEffect(() => {
          inputState.current = { left: leftSteerPressed, right: rightSteerPressed, gas: gasPressed, brake: brakePressed };
        }, [leftSteerPressed, rightSteerPressed, gasPressed, brakePressed]);

        useEffect(() => {
          const handleKeyDown = (e) => { keysPressed.current[e.key.toLowerCase()] = true; };
          const handleKeyUp = (e) => { keysPressed.current[e.key.toLowerCase()] = false; };
          window.addEventListener('keydown', handleKeyDown);
          window.addEventListener('keyup', handleKeyUp);
          return () => {
            window.removeEventListener('keydown', handleKeyDown);
            window.removeEventListener('keyup', handleKeyUp);
          };
        }, []);

        useEffect(() => {
          const handleOrientation = (e) => {
            if (steeringRef.current !== 'tilt') return;
            const gamma = e.gamma || 0;
            let rawTilt = gamma / 25;
            tiltRef.current = tiltRef.current * 0.7 + Math.max(-1, Math.min(1, rawTilt)) * 0.3;
          };
          window.addEventListener('deviceorientation', handleOrientation);
          return () => window.removeEventListener('deviceorientation', handleOrientation);
        }, []);

        useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          if (!ctx) return;

          const resizeCanvas = () => {
            const container = containerRef.current;
            if (!container) return;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            stateRef.current.bikeX = canvas.width / 2;
            stateRef.current.bikeY = canvas.height * 0.82;
          };

          const resizeObserver = new ResizeObserver(() => resizeCanvas());
          if (containerRef.current) resizeObserver.observe(containerRef.current);
          resizeCanvas();

          const state = stateRef.current;
          state.fuel = 100 + upgradesRef.current.tank * 30;
          state.coinsCollectedThisRun = 0;
          state.distanceKm = 0;
          state.bikeSpeed = 0;
          state.activePassenger = null;
          state.stageProgress = 0;
          state.stageActive = false;
          state.obstacles = [];
          state.coins = [];
          state.particles = [];

          onPassengerUpdate(null);
          onGameStatsUpdate(0, 0, 0);

          // Spawn Initial Items
          const w = canvas.width || 400;
          for (let i = 0; i < 8; i++) {
            state.coins.push({
              id: Math.random().toString(),
              x: 80 + Math.random() * (w - 160),
              y: -150 - i * 160,
              collected: false,
              value: 10,
              isFuel: Math.random() < 0.25
            });
          }
          for (let i = 0; i < 3; i++) {
            state.obstacles.push({
              id: Math.random().toString(),
              x: 80 + Math.random() * (w - 160),
              y: -250 - i * 350,
              width: 50,
              height: 50,
              speed: 1.0 + Math.random() * 2,
              type: ['sedan', 'matatu', 'tuktuk', 'goat', 'pothole'][Math.floor(Math.random() * 5)],
              color: '#dc2626',
              damaged: false
            });
          }

          if (soundEnabled) BodaAudio.startEngine();

          let lastTime = performance.now();
          let frameCount = 0;

          const gameLoop = (time) => {
            if (isPaused) {
              lastTime = time;
              requestRef.current = requestAnimationFrame(gameLoop);
              return;
            }
            const dt = (time - lastTime) / 1000;
            lastTime = time;
            frameCount++;

            const w = canvas.width;
            const h = canvas.height;
            state.bikeY = h * 0.82;

            // Engine sound updates
            if (soundEnabled) {
              BodaAudio.updateEngine(state.bikeSpeed / state.bikeMaxSpeed);
            }

            // Inputs
            let gasActive = inputState.current.gas || keysPressed.current['w'] || keysPressed.current['arrowup'];
            let brakeActive = inputState.current.brake || keysPressed.current['s'] || keysPressed.current['arrowdown'];

            let accelMult = 1.0;
            let brakeMult = 1.0;
            let gripMult = 1.0;

            if (weatherRef.current === 'rain') {
              brakeMult = 0.55;
              gripMult = 0.55;
            } else if (weatherRef.current === 'dusty') {
              accelMult = 0.8;
              gripMult = 0.75;
            }

            const accelFactor = (bikeConfigRef.current.acceleration + upgradesRef.current.engine * 0.12) * accelMult;
            const brakeFactor = (bikeConfigRef.current.braking + upgradesRef.current.brakes * 0.18) * brakeMult;
            const mass = state.activePassenger ? state.activePassenger.weight : 1.0;

            if (gasActive && state.fuel > 0) {
              state.bikeSpeed += (accelFactor / mass) * 60 * dt;
              state.fuel -= 4.0 * dt;
            } else {
              state.bikeSpeed -= 2.0 * dt;
            }
            if (brakeActive) state.bikeSpeed -= (brakeFactor / mass) * 120 * dt;

            state.bikeSpeed = Math.max(0, Math.min(state.bikeSpeed, state.bikeMaxSpeed));

            // Out of petrol
            if (state.fuel <= 0) {
              state.fuel = 0;
              if (state.bikeSpeed < 0.2) {
                BodaAudio.stopEngine();
                onGameOver(state.coinsCollectedThisRun, state.distanceKm, "Out of fuel! Tafuta petroli next time!", false);
                return;
              }
              onTriggerWarning("OUT OF PETROL! GLIDING TO STOP...");
            } else if (state.fuel < state.maxFuel * 0.25) {
              onTriggerWarning("PETROL LOW! SWERVE TO PICK JERRYCANS");
            } else {
              onTriggerWarning(null);
            }

            // Steer
            let steerVal = 0;
            if (steeringRef.current === 'keyboard') {
              if (keysPressed.current['a'] || keysPressed.current['arrowleft']) steerVal = -1;
              else if (keysPressed.current['d'] || keysPressed.current['arrowright']) steerVal = 1;
            } else if (steeringRef.current === 'buttons') {
              if (inputState.current.left) steerVal = -1;
              if (inputState.current.right) steerVal = 1;
            } else if (steeringRef.current === 'tilt') {
              steerVal = tiltRef.current;
            }

            const tireGrip = (1.0 + upgradesRef.current.tires * 0.25) * gripMult;
            state.bikeVx = steerVal * (bikeConfigRef.current.handling * tireGrip) * (4.0 + state.bikeSpeed * 0.15);
            state.bikeX += state.bikeVx;
            state.bikeLean = state.bikeLean * 0.8 + (steerVal * 0.2) * 0.2;

            // Constrain
            if (state.bikeX < 55) { state.bikeX = 55; state.bikeSpeed *= 0.95; }
            if (state.bikeX > w - 55) { state.bikeX = w - 55; state.bikeSpeed *= 0.95; }

            // Travel Distance
            const chunkDist = (state.bikeSpeed * dt) * 0.01;
            state.distanceKm += chunkDist;
            state.stageProgress += chunkDist;

            // Passenger drop-off checks
            if (state.activePassenger) {
              state.activePassenger.distanceTraveled += chunkDist;
              if (state.activePassenger.distanceTraveled >= state.activePassenger.targetDistance) {
                const earned = Math.floor(state.activePassenger.fare * state.activePassenger.payrate);
                state.coinsCollectedThisRun += earned;
                onPlaySound('success');
                state.activePassenger = null;
                state.stageProgress = 0;
                onPassengerUpdate(null);
                onTriggerWarning("DELIVERED SAFELY! BONUS EARNED!");
              } else {
                onPassengerUpdate({ ...state.activePassenger });
              }
            }

            // Road & Scenery tiling scroll
            state.roadScrollY += state.bikeSpeed;
            if (state.roadScrollY > 75) state.roadScrollY = 0;
            state.sceneryScrollY += state.bikeSpeed * 0.8;
            if (state.sceneryScrollY > h) state.sceneryScrollY = -200;

            // Spawning Items
            state.coins.forEach(c => {
              c.y += state.bikeSpeed;
              if (c.y > h + 100) {
                c.y = -150 - Math.random() * 100;
                c.x = 80 + Math.random() * (w - 160);
                c.collected = false;
                c.isFuel = Math.random() < 0.22;
              }
              // Pick Up Collision
              if (!c.collected && Math.hypot(state.bikeX - c.x, state.bikeY - c.y) < 28) {
                c.collected = true;
                if (c.isFuel) {
                  state.fuel = Math.min(state.maxFuel, state.fuel + 40);
                  onPlaySound('fuel');
                } else {
                  state.coinsCollectedThisRun += c.value;
                  onPlaySound('coin');
                }
              }
            });

            // Road stage shelter
            if (!state.activePassenger && state.stageProgress > 0.6 && !state.stageActive) {
              state.stageActive = true;
              state.stageY = -200;
              state.stageX = w - 50;
              state.stagePassenger = generateRandomPassenger();
            }

            if (state.stageActive) {
              state.stageY += state.bikeSpeed;
              if (state.stageY > state.bikeY - 60 && state.stageY < state.bikeY + 60) {
                if (state.bikeSpeed < 2.0) {
                  state.activePassenger = state.stagePassenger;
                  state.stageActive = false;
                  state.stageProgress = 0;
                  onPlaySound('coin');
                  onTriggerWarning(`RIDER ON BOARD: ${state.activePassenger.name}`);
                  onPassengerUpdate({ ...state.activePassenger });
                } else {
                  onTriggerWarning("SLOW BELOW 5 KM/H TO BOARD PASSENGER!");
                }
              }
              if (state.stageY > h + 200) {
                state.stageActive = false;
                state.stageProgress = 0.2;
              }
            }

            // Move & Draw Obstacles
            state.obstacles.forEach(ob => {
              ob.y += state.bikeSpeed - ob.speed;
              if (ob.y > h + 150) {
                ob.y = -200 - Math.random() * 400;
                ob.x = 80 + Math.random() * (w - 160);
                ob.type = ['sedan', 'matatu', 'tuktuk', 'goat', 'pothole'][Math.floor(Math.random() * 5)];
                ob.speed = ob.type === 'pothole' ? 0 : 1.0 + Math.random() * 3;
                ob.damaged = false;
              }

              // Collision Check
              if (!ob.damaged && Math.hypot(state.bikeX - ob.x, state.bikeY - ob.y) < (ob.type === 'pothole' ? 25 : 32)) {
                ob.damaged = true;
                onPlaySound('crash');
                if (ob.type === 'pothole') {
                  state.bikeSpeed *= 0.5;
                  if (state.activePassenger) {
                    state.activePassenger.comfort = Math.max(0, state.activePassenger.comfort - 25);
                    if (state.activePassenger.comfort <= 0) {
                      state.activePassenger = null;
                      onPassengerUpdate(null);
                      onTriggerWarning("PASSENGER ALIGHTED DUE TO ROUGH RIDE!");
                    }
                  }
                } else {
                  onGameOver(state.coinsCollectedThisRun, state.distanceKm, `Crushed into a ${ob.type.toUpperCase()}! Kwisha wewe!`, true);
                }
              }
            });

            // DRAW SCENE
            const currentLoc = locationConfigRef.current;
            ctx.fillStyle = currentLoc.shoulderColor;
            ctx.fillRect(0, 0, w, h);

            // Draw highway lane
            ctx.fillStyle = currentLoc.roadColor;
            ctx.fillRect(50, 0, w - 100, h);

            // Side lines
            ctx.fillStyle = '#fff';
            ctx.fillRect(50, 0, 4, h);
            ctx.fillRect(w - 54, 0, 4, h);

            // Center dashes
            ctx.strokeStyle = 'rgba(255,255,255,0.7)';
            ctx.lineWidth = 4;
            ctx.setLineDash([30, 40]);
            ctx.beginPath();
            ctx.moveTo(w / 2, state.roadScrollY - 70);
            ctx.lineTo(w / 2, h + 70);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw decorative landscape emojis
            ctx.font = '22px Arial';
            ctx.fillText(currentLoc.sceneryType === 'coast' ? '🌴' : '🏡', 15, state.sceneryScrollY);
            ctx.fillText(currentLoc.sceneryType === 'coast' ? '🌴' : '🌳', w - 35, state.sceneryScrollY + h/2);

            // Draw Boda Stage
            if (state.stageActive) {
              ctx.fillStyle = '#1e293b';
              ctx.fillRect(state.stageX - 15, state.stageY - 20, 30, 40);
              ctx.fillStyle = '#ef4444';
              ctx.fillRect(state.stageX - 20, state.stageY - 30, 40, 10);
              ctx.fillStyle = '#000';
              ctx.font = '9px sans-serif';
              ctx.fillStyle = '#fbbf24';
              ctx.fillText('STAGE', state.stageX - 14, state.stageY - 10);
              if (state.stagePassenger) {
                ctx.font = '18px Arial';
                ctx.fillText(state.stagePassenger.avatar, state.stageX - 8, state.stageY + 15);
              }
            }

            // Draw coins
            state.coins.forEach(c => {
              if (c.collected) return;
              ctx.font = '20px Arial';
              ctx.fillText(c.isFuel ? '⛽' : '🪙', c.x - 10, c.y + 7);
            });

            // Draw obstacles
            state.obstacles.forEach(ob => {
              ctx.font = '24px Arial';
              let emoji = '🚗';
              if (ob.type === 'matatu') emoji = '🚌';
              else if (ob.type === 'tuktuk') emoji = '🛺';
              else if (ob.type === 'goat') emoji = '🐐';
              else if (ob.type === 'pothole') emoji = '🕳️';
              ctx.fillText(emoji, ob.x - 12, ob.y + 10);
            });

            // Draw Rider & Bike (arcade drawing style)
            ctx.save();
            ctx.translate(state.bikeX, state.bikeY);
            ctx.rotate(state.bikeLean);

            // Headlight glow
            const lightGrad = ctx.createLinearGradient(0, -30, 0, -150);
            lightGrad.addColorStop(0, 'rgba(253, 224, 71, 0.4)');
            lightGrad.addColorStop(1, 'rgba(253, 224, 71, 0)');
            ctx.fillStyle = lightGrad;
            ctx.beginPath();
            ctx.moveTo(0, -30);
            ctx.lineTo(-40, -150);
            ctx.lineTo(40, -150);
            ctx.closePath();
            ctx.fill();

            // Bike frame shadow/wheels
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(-4, -30, 8, 60); // tires vertical view
            ctx.fillStyle = bikeConfigRef.current.color;
            ctx.fillRect(-6, -15, 12, 30); // body chassis

            // Rider helmet
            ctx.fillStyle = '#84cc16'; // jacket
            ctx.fillRect(-7, -4, 14, 10);
            ctx.fillStyle = '#ef4444'; // Helmet Red
            ctx.beginPath();
            ctx.arc(0, -1, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#111'; // Visor
            ctx.fillRect(-4, -6, 8, 3);

            // Boarded Passenger on pillion seat behind rider
            if (state.activePassenger) {
              ctx.font = '18px Arial';
              ctx.fillText(state.activePassenger.avatar, -9, 25);
            }

            ctx.restore();

            // Weather tints
            if (weatherRef.current === 'rain') {
              ctx.fillStyle = 'rgba(15, 23, 42, 0.18)';
              ctx.fillRect(0, 0, w, h);
            } else if (weatherRef.current === 'dusty') {
              ctx.fillStyle = 'rgba(120, 85, 45, 0.15)';
              ctx.fillRect(0, 0, w, h);
            }

            // Sync Stats Back
            if (frameCount % 6 === 0) {
              onGameStatsUpdate(state.coinsCollectedThisRun, state.distanceKm, state.bikeSpeed);
            }

            requestRef.current = requestAnimationFrame(gameLoop);
          };

          requestRef.current = requestAnimationFrame(gameLoop);

          return () => {
            if (requestRef.current) cancelAnimationFrame(requestRef.current);
            BodaAudio.stopEngine();
          };
        }, [isPaused]);

        return (
          <div ref={containerRef} className="w-full h-full relative overflow-hidden bg-zinc-950">
            <canvas ref={canvasRef} className="absolute inset-0 block w-full h-full" />
          </div>
        );
      }

      // 7. CORE CONTAINER ENGINE (App)
      const SAVE_KEY = 'boda_rider_ke_save_standalone_v2';
      const INITIAL_SAVE = {
        coins: 150,
        ownedBikes: ['boxer_150'],
        activeBikeId: 'boxer_150',
        upgrades: { engine: 0, brakes: 0, tires: 0, tank: 0 },
        highScoreDistance: 0,
        highScoreCoins: 0,
        completedAchievements: []
      };

      export default function App() {
        const [saveData, setSaveData] = useState(INITIAL_SAVE);
        const [isPlaying, setIsPlaying] = useState(false);
        const [isPaused, setIsPaused] = useState(false);
        const [selectedLocationId, setSelectedLocationId] = useState('nairobi_highway');
        const [steeringMode, setSteeringMode] = useState('buttons');
        const [soundEnabled, setSoundEnabled] = useState(true);
        const [weather, setWeather] = useState('clear');

        const [runCoins, setRunCoins] = useState(0);
        const [runDistance, setRunDistance] = useState(0);
        const [runSpeed, setRunSpeed] = useState(0);
        const [passenger, setPassenger] = useState(null);
        const [warningMessage, setWarningMessage] = useState(null);
        const [gameOverInfo, setGameOverInfo] = useState(null);

        useEffect(() => {
          const raw = localStorage.getItem(SAVE_KEY);
          if (raw) {
            try {
              const parsed = JSON.parse(raw);
              setSaveData({ ...INITIAL_SAVE, ...parsed, upgrades: { ...INITIAL_SAVE.upgrades, ...(parsed.upgrades || {}) } });
            } catch (e) {
              console.warn(e);
            }
          }
        }, []);

        const save = (updated) => {
          setSaveData(updated);
          localStorage.setItem(SAVE_KEY, JSON.stringify(updated));
        };

        const handleToggleSound = () => {
          const next = !soundEnabled;
          setSoundEnabled(next);
          if (!next) BodaAudio.stopEngine();
        };

        const triggerAudio = (type) => {
          if (!soundEnabled) return;
          if (type === 'coin') BodaAudio.playCoin();
          else if (type === 'fuel') BodaAudio.playFuel();
          else if (type === 'crash') BodaAudio.playCrash();
          else if (type === 'success') BodaAudio.playSuccess();
          else if (type === 'horn') BodaAudio.playHorn();
        };

        const handleUpgrade = (type) => {
          const current = saveData.upgrades[type];
          if (current >= 5) return;
          const cost = 80 + current * 120;
          if (saveData.coins >= cost) {
            const nextUpg = { ...saveData.upgrades, [type]: current + 1 };
            save({ ...saveData, coins: saveData.coins - cost, upgrades: nextUpg });
            triggerAudio('success');
          }
        };

        const handlePurchaseBike = (bikeId, price) => {
          if (saveData.coins >= price && !saveData.ownedBikes.includes(bikeId)) {
            save({ ...saveData, coins: saveData.coins - price, ownedBikes: [...saveData.ownedBikes, bikeId], activeBikeId: bikeId });
            triggerAudio('success');
          }
        };

        const handleSelectBike = (bikeId) => {
          if (saveData.ownedBikes.includes(bikeId)) {
            save({ ...saveData, activeBikeId: bikeId });
            triggerAudio('coin');
          }
        };

        const handleStartGame = () => {
          setIsPlaying(true);
          setIsPaused(false);
          setGameOverInfo(null);
          setRunCoins(0);
          setRunDistance(0);
          setPassenger(null);
          setWarningMessage(null);
          if (soundEnabled) BodaAudio.startEngine();
        };

        const handleGameOver = (finalCoins, distance, reason, isCrash) => {
          BodaAudio.stopEngine();
          setIsPlaying(false);
          const currentAchievements = [...saveData.completedAchievements];
          const newUnlocked = [];

          if (!currentAchievements.includes('first_ride') && distance > 0.4) {
            newUnlocked.push('first_ride'); currentAchievements.push('first_ride');
          }
          if (!currentAchievements.includes('coin_hunter') && finalCoins >= 100) {
            newUnlocked.push('coin_hunter'); currentAchievements.push('coin_hunter');
          }
          if (!currentAchievements.includes('distance_pro') && (saveData.highScoreDistance + distance) > 5.0) {
            newUnlocked.push('distance_pro'); currentAchievements.push('distance_pro');
          }

          save({
            ...saveData,
            coins: saveData.coins + finalCoins,
            highScoreDistance: Math.max(saveData.highScoreDistance, distance),
            highScoreCoins: Math.max(saveData.highScoreCoins, finalCoins),
            completedAchievements: currentAchievements
          });

          setGameOverInfo({ coins: finalCoins, distance, reason, unlockedBadges: newUnlocked, isCrash });
        };

        const [leftPressed, setLeftPressed] = useState(false);
        const [rightPressed, setRightPressed] = useState(false);
        const [gasPressed, setGasPressed] = useState(false);
        const [brakePressed, setBrakePressed] = useState(false);

        return (
          <div className="relative w-full h-screen select-none overflow-hidden bg-zinc-950 flex flex-col justify-center items-center">
            {!isPlaying && !gameOverInfo && (
              <Menu
                saveData={saveData}
                selectedLocationId={selectedLocationId}
                onSelectLocation={setSelectedLocationId}
                steeringMode={steeringMode}
                onSelectSteeringMode={setSteeringMode}
                weather={weather}
                onSelectWeather={setWeather}
                onUpgrade={handleUpgrade}
                onPurchaseBike={handlePurchaseBike}
                onSelectBike={handleSelectBike}
                onStartGame={handleStartGame}
                soundEnabled={soundEnabled}
                onToggleSound={handleToggleSound}
              />
            )}

            {isPlaying && (
              <div className="absolute inset-0 w-full h-full flex flex-col justify-end">
                <GameCanvas
                  activeBikeId={saveData.activeBikeId}
                  locationId={selectedLocationId}
                  upgrades={saveData.upgrades}
                  steeringMode={steeringMode}
                  weather={weather}
                  isPaused={isPaused}
                  leftSteerPressed={leftPressed}
                  rightSteerPressed={rightPressed}
                  gasPressed={gasPressed}
                  brakePressed={brakePressed}
                  onGameStatsUpdate={(coins, distance, speed) => {
                    setRunCoins(coins);
                    setRunDistance(distance);
                    setRunSpeed(speed);
                  }}
                  onPassengerUpdate={setPassenger}
                  onTriggerWarning={setWarningMessage}
                  onGameOver={handleGameOver}
                  onPlaySound={triggerAudio}
                  soundEnabled={soundEnabled}
                />
                <HUD
                  coins={runCoins}
                  speed={runSpeed}
                  distance={runDistance}
                  fuel={runCoins * 0.1 /* simulated / synchronized fallback inside canvas */}
                  maxFuel={100}
                  passenger={passenger}
                  steeringMode={steeringMode}
                  onSteerLeft={setLeftPressed}
                  onSteerRight={setRightPressed}
                  onGas={setGasPressed}
                  onBrake={setBrakePressed}
                  onHorn={() => triggerAudio('horn')}
                  warningMessage={warningMessage}
                  isPaused={isPaused}
                  onPauseToggle={() => {
                    setIsPaused(!isPaused);
                    if (soundEnabled) {
                      if (isPaused) BodaAudio.startEngine();
                      else BodaAudio.stopEngine();
                    }
                  }}
                  onExitGame={() => {
                    if (window.confirm("Buda, are you sure you want to stop this ride? Coins collected this run won't be saved!")) {
                      BodaAudio.stopEngine();
                      setIsPlaying(false);
                    }
                  }}
                />

                {isPaused && (
                  <div className="absolute inset-0 bg-zinc-950/70 backdrop-blur-sm z-30 flex flex-col justify-center items-center p-6 text-center animate-fade-in">
                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl max-w-sm w-full space-y-6 shadow-2xl animate-scale-in">
                      <div>
                        <h3 className="text-xl font-black text-white">RIDE PAUSED</h3>
                        <p className="text-xs text-zinc-400 mt-1">Take a breath, then get back to the streets</p>
                      </div>
                      <div className="space-y-2">
                        <button onClick={() => { setIsPaused(false); if (soundEnabled) BodaAudio.startEngine(); }} className="w-full py-3 bg-white text-zinc-950 font-black rounded-xl text-xs uppercase tracking-wider transition hover:bg-zinc-200">CONTINUE RIDING</button>
                        <button onClick={() => { BodaAudio.stopEngine(); setIsPlaying(false); }} className="w-full py-3 bg-zinc-850 text-zinc-400 font-bold rounded-xl text-xs uppercase hover:bg-zinc-800">RETURN TO MENU</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {gameOverInfo && (
              <div className="fixed inset-0 bg-zinc-950/95 backdrop-blur-sm z-40 flex flex-col justify-center items-center p-4 animate-fade-in">
                <div className="bg-zinc-900 border border-zinc-800 p-6 sm:p-8 rounded-2xl max-w-sm w-full space-y-6 shadow-2xl text-center animate-scale-in">
                  <div>
                    <span className="w-12 h-12 bg-red-600/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-3 border border-red-500/20">
                      {gameOverInfo.isCrash ? <Icons.XCircle className="w-6 h-6 animate-pulse" /> : <Icons.ShieldAlert className="w-6 h-6 animate-bounce" />}
                    </span>
                    <h2 className="text-2xl font-black text-red-500">{gameOverInfo.isCrash ? 'MISSION FAILED' : 'OUT OF PETROL'}</h2>
                    <p className="text-[10px] text-red-400 font-mono uppercase mt-2 px-3 py-1 bg-red-500/10 rounded-full inline-block leading-none">{gameOverInfo.reason}</p>
                  </div>

                  <div className="grid grid-cols-2 gap-3 bg-zinc-950 p-4 rounded-xl border border-zinc-850">
                    <div>
                      <span className="text-[8px] font-mono text-zinc-500 uppercase font-bold block">DISTANCE</span>
                      <span className="text-lg font-black text-white font-mono">{gameOverInfo.distance.toFixed(2)} KM</span>
                    </div>
                    <div className="border-l border-zinc-850">
                      <span className="text-[8px] font-mono text-zinc-500 uppercase font-bold block">EARNINGS</span>
                      <span className="text-lg font-black text-amber-400 font-mono">+{gameOverInfo.coins} KES</span>
                    </div>
                  </div>

                  {gameOverInfo.unlockedBadges.length > 0 && (
                    <div className="p-3 bg-emerald-500/10 border border-emerald-500/30 rounded-xl text-left space-y-1">
                      <h4 className="text-[10px] font-black text-emerald-400 uppercase tracking-widest">🏆 BADGES UNLOCKED!</h4>
                      {gameOverInfo.unlockedBadges.map(bId => (
                        <div key={bId} className="flex items-center gap-1 text-[10px] text-zinc-300 font-medium">
                          <Icons.Check className="w-3.5 h-3.5 text-emerald-500" />
                          <span>{bId === 'first_ride' ? 'Stage 1 Complete' : bId === 'coin_hunter' ? 'Chapaa Master' : 'Long Distance Rider'} unlocked!</span>
                        </div>
                      ))}
                    </div>
                  )}

                  <div className="space-y-2 pt-2">
                    <button onClick={handleStartGame} className="w-full py-3.5 bg-gradient-to-r from-red-600 to-amber-500 hover:from-red-500 hover:to-amber-450 text-white font-black rounded-xl text-sm uppercase shadow-lg">RIDE AGAIN</button>
                    <button onClick={() => setGameOverInfo(null)} className="w-full py-2.5 bg-zinc-800 text-zinc-300 font-bold rounded-xl text-xs uppercase hover:bg-zinc-750">GOTO GARAGE</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // Render App
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);

      // PWA SERVICE WORKER REGISTRATION (Dynamic same-origin registration helper)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(reg => {
            console.log('ServiceWorker registered successfully.');
          }).catch(err => {
            console.log('Offline cache registration ignored (standard on unhosted local file runs).');
          });
        });
      }
    </script>
  </body>
</html>
